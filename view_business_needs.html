<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Боли и бизнес-потребности</title>
  <link rel="icon" href="favicon.ico"/>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f6f7fb;color:#111;}
    .app{display:flex;min-height:100vh;}
    .sidebar{width:290px;background:#fff;border-right:1px solid #e7e7ef;padding:14px 14px 18px;box-sizing:border-box;}
    .brand{font-weight:700;margin:6px 0 12px;}
    .dock{background:#f7f8fc;border:1px solid #ececf6;border-radius:14px;padding:10px;}
    .dockRow{display:flex;gap:8px;align-items:center;}
    #dockCompany{flex:1;border:1px solid #e1e1ee;border-radius:10px;padding:10px 12px;font-size:14px;outline:none;background:#fff;}
    #dockLoadBtn{border:0;border-radius:12px;padding:10px 14px;background:#e11;color:#fff;font-weight:700;cursor:pointer;}
    #dockSuggest{margin-top:8px;display:none;background:#fff;border:1px solid #e1e1ee;border-radius:12px;overflow:hidden;max-height:260px;overflow-y:auto}
    .sugItem{padding:10px 12px;cursor:pointer;border-top:1px solid #f0f0f6}
    .sugItem:first-child{border-top:0}
    .sugItem:hover{background:#f6f7fb}
    .nav{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .nav .tile{border:1px solid #ececf6;background:#fff;border-radius:14px;padding:12px;font-size:13px;cursor:pointer;}
    .main{flex:1;padding:18px 18px 26px;box-sizing:border-box;}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;}
    .title{font-size:18px;font-weight:800;}
    .sub{font-size:12px;color:#666;margin-top:2px;}
    #bnStatus{font-size:12px;color:#b00020;min-height:16px;}
    #bnCompanyLabel{font-weight:700;}
    .btn{border:1px solid #e1e1ee;background:#fff;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer;}
    .btnPrimary{background:#111;color:#fff;border-color:#111;}
    .card{background:#fff;border:1px solid #ececf6;border-radius:16px;padding:12px;margin-top:12px;}
    .rowTitle{font-weight:800;margin-bottom:6px;}
    /* horizontal lists */
    #themeList,#needsList{display:flex;gap:10px;overflow:auto;padding-bottom:6px;}
    .chip{white-space:nowrap;border:1px solid #ececf6;border-radius:999px;padding:8px 12px;font-size:13px;background:#fff;cursor:pointer;}
    .chip.active{border-color:#111}
    .needCard{min-width:260px;max-width:360px;border:1px solid #ececf6;border-radius:14px;padding:10px 12px;background:#fff;cursor:pointer;}
    .needCard.active{border-color:#111}
    .needName{font-weight:800;font-size:13px;margin-bottom:4px;}
    .needMeta{font-size:12px;color:#666;}
    .filters{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-top:8px}
    .filters label{font-size:12px;color:#333;display:flex;gap:6px;align-items:center}
    /* main panel layout */
    #needPanel{margin-top:12px}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">Быстрый вход</div>
      <div class="dock">
        <div class="dockRow">
          <input id="dockCompany" type="text" placeholder="Введите компанию"/>
          <button id="dockLoadBtn">Загрузить</button>
        </div>
        <div id="dockSuggest"></div>
      </div>

      <div class="nav">
        <div class="tile" onclick="location.href='view_1_indices.html'">Индексы</div>
        <div class="tile" onclick="location.href='view_2_interview.html'">Интервью</div>
        <div class="tile" onclick="location.href='view_5_full.html'">Полная карта</div>
        <div class="tile" onclick="location.href='view_6_summary.html'">Выводы</div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <div class="title">Боли и бизнес-потребности</div>
          <div class="sub">Риски → тематики → бизнес‑потребности → вопросы/причины/боли. Компания: <span id="bnCompanyLabel">—</span></div>
          <div id="bnStatus"></div>
        </div>
        <div style="display:flex;gap:10px;align-items:center">
          <button class="btn" id="bnSaveBtn">Сохранить всё</button>
          <button class="btn" id="dockToggle" style="display:none">◀</button>
        </div>
      </div>

      <div class="card">
        <div class="rowTitle">Тематики</div>
        <div id="themeList"></div>
      </div>

      <div class="card">
        <div class="rowTitle">Бизнес‑потребности</div>
        <div style="font-size:12px;color:#666;margin-bottom:6px">Сортировка — по силе (риск × вес) / ABM.</div>
        <div class="filters">
          <label><input type="checkbox" id="bnFltTriggers"> Только с триггерами</label>
          <label><input type="checkbox" id="bnFltCritical"> Только критические</label>
          <label><input type="checkbox" id="bnFltMain"> Только “основные” ⭐</label>
        </div>
        <div id="needsList" style="margin-top:8px"></div>
      </div>

      <div id="needPanel" class="card">
        <div id="bnSummary" style="color:#666;font-size:13px">Выбери бизнес‑потребность выше.</div>
      </div>
    </main>
  </div>

  <script src="config.js?v=v109"></script>
  <script src="build_info.js?v=v109"></script>
  <script src="sheet_keys.js"></script>
  <script src="question_bank.js"></script>
  <script src="bn_catalog.json?v=v109"></script>
  <script src="abm_needs.json?v=v109"></script>
  <script src="bn_engine_v2.js?v=v109"></script>
</body>
</html>

<script>
(function(){
  const WEBAPP_URL = (window.GS_WEBAPP_URL || window.GOOGLE_SHEETS_WEBAPP_URL || "").trim();

  // JSONP helper
  function jsonp(url, timeoutMs=15000){
    return new Promise((resolve, reject) => {
      const cb = "cb_" + Math.random().toString(36).slice(2) + "_" + Date.now();
      const sep = url.includes("?") ? "&" : "?";
      const full = url + sep + "callback=" + encodeURIComponent(cb);
      const script = document.createElement("script");
      script.src = full;
      script.async = true;
      let done = false;
      const cleanup = () => {
        if(done) return;
        done = true;
        try { delete window[cb]; } catch(e) { window[cb] = undefined; }
        try { script.remove(); } catch(e) {}
      };
      const timer = setTimeout(() => { cleanup(); reject(new Error("JSONP timeout")); }, timeoutMs);
      window[cb] = (data) => { clearTimeout(timer); cleanup(); resolve(data); };
      script.onerror = () => { clearTimeout(timer); cleanup(); reject(new Error("JSONP request failed")); };
      document.body.appendChild(script);
    });
  }

  function showLoader(title, sub){
    const el = document.getElementById('globalLoader');
    if(!el) return;
    document.getElementById('globalLoaderTitle').textContent = title || 'Загружаю…';
    document.getElementById('globalLoaderSub').textContent = sub || '';
    el.style.display='flex';
  }
  function hideLoader(){
    const el = document.getElementById('globalLoader');
    if(el) el.style.display='none';
  }

  function setCompanyInLinks(company){
    document.querySelectorAll('.toolGrid a.tool').forEach(a=>{
      try{
        const u = new URL(a.getAttribute('href'), location.href);
        if(company) u.searchParams.set('company', company);
        a.setAttribute('href', u.pathname + '?' + u.searchParams.toString());
      }catch(_e){}
    });
  }

  // Dock toggle
  (function(){
    const btn = document.getElementById('dockToggle');
    const dock = document.getElementById('quickDock');
    if(!btn || !dock) return;
    const KEY='itmenDockCollapsed';
    function apply(collapsed){
      document.body.classList.toggle('dockCollapsed', !!collapsed);
      btn.textContent = collapsed ? '▶' : '◀';
    }
    const stored = localStorage.getItem(KEY);
    apply(stored==='1');
    btn.addEventListener('click', ()=>{
      const next = !document.body.classList.contains('dockCollapsed');
      localStorage.setItem(KEY, next ? '1':'0');
      apply(next);
    });
  })();

  // Dock search + load
  (function(){
    const input = document.getElementById('dockCompany');
    const dd = document.getElementById('dockSuggest');
    const loadBtn = document.getElementById('dockLoadBtn');
    if(!input || !dd) return;

    const getCompanyFromUrl = () => {
      try{ return (new URL(location.href)).searchParams.get('company') || ''; }catch(e){ return ''; }
    };

    function render(items){
      if(!items.length){ dd.style.display='none'; dd.innerHTML=''; return; }
      dd.innerHTML = items.map(it=>{
        const name = (it.company||'').replaceAll('"','&quot;');
        const meta = it.timestamp ? ('<span style="color:#6b7280;font-size:12px">обновлено: '+String(it.timestamp).replaceAll('<','&lt;')+'</span>') : '';
        return '<div class="dockItem" data-company="'+name+'"><b>'+name+'</b> '+meta+'</div>';
      }).join('');
      dd.style.display='block';
      dd.querySelectorAll('.dockItem').forEach(el=>{
        el.addEventListener('click', ()=>{
          const c = el.getAttribute('data-company')||'';
          dd.style.display='none';
          input.value = c;
          setCompanyInLinks(c);
          const u = new URL(location.href);
          u.searchParams.set('company', c);
          location.href = u.toString();
        });
      });
    }

    let t=null;
    input.addEventListener('input', ()=>{
      const q=input.value.trim();
      clearTimeout(t);
      if(!q || !WEBAPP_URL){ dd.style.display='none'; return; }
      t=setTimeout(async ()=>{
        try{
          const data = await jsonp(WEBAPP_URL+'?action=search&q='+encodeURIComponent(q)+'&limit=10');
          const items = (data && data.ok && Array.isArray(data.items)) ? data.items : [];
          render(items);
        }catch(_e){ dd.style.display='none'; }
      }, 250);
    });

    input.addEventListener('blur', ()=>setTimeout(()=>{ dd.style.display='none'; }, 180));

    if(loadBtn){
      loadBtn.addEventListener('click', ()=>{
        const c = input.value.trim();
        if(!c) return;
        const u = new URL(location.href);
        u.searchParams.set('company', c);
        location.href = u.toString();
      });
    }

    // apply company from URL
    const c0 = getCompanyFromUrl();
    if(c0){ input.value = c0; setCompanyInLinks(c0); document.getElementById('fi_company').value = c0; }
  })();

  // Fast form
  const $ = (id)=>document.getElementById(id);
  function getCompany(){ return ($('fi_company').value || $('dockCompany').value || '').trim(); }

  $('btnGoInterview').addEventListener('click', ()=>{
    const c = getCompany();
    const u = new URL('view_2_interview.html', location.href);
    if(c) u.searchParams.set('company', c);
    location.href = u.toString();
  });

  $('btnClear').addEventListener('click', ()=>{
    ['fi_lpr','fi_workplaces','fi_servers','fi_branches','fi_closed','fi_manualPct','fi_t1'].forEach(id=>{ const el=$(id); if(!el) return; if(el.tagName==='SELECT') el.value=''; else el.value='0'; });
  });

  
  function ynpScore(v){
    if(v==='Да') return 2;
    if(v==='Частично') return 1;
    if(v==='Нет') return 0;
    return '';
  }
  function yn01(v){
    if(v==='Да') return 1;
    if(v==='Нет') return 0;
    // 'Частично' -> treat as 1? For risk flags we keep 1 only when 'Да'
    return 0;
  }
  function collectionToT2(v){
    if(v==='auto') return 2;
    if(v==='mixed') return 1;
    if(v==='manual') return 0;
    if(v==='none') return 0;
    return '';
  }
  function collectionToT5(v){
    if(v==='auto') return 2;
    if(v==='mixed') return 1;
    if(v==='manual') return 0;
    if(v==='none') return 0;
    return '';
  }
  function collectionToProc5(v){
    if(v==='auto') return 2;
    if(v==='mixed') return 1;
    if(v==='manual') return 0;
    if(v==='none') return 0;
    return '';
  }

$('btnSave').addEventListener('click', async ()=>{
    if(!WEBAPP_URL){ alert('Не задан URL Apps Script (GS_WEBAPP_URL)'); return; }
    const company = getCompany();
    if(!company){ alert('Введи название компании'); return; }

    const payload = {
      company,
      lpr: $('fi_lpr').value.trim(),
      workplaces: Number($('fi_workplaces').value||0),
      servers: Number($('fi_servers').value||0),
      branches: Number($('fi_branches').value||0),
      hosting_model: $('fi_hosting').value,
      closed: $('fi_closed').value,
      manualPct: Number($('fi_manualPct').value||0),

      // ===== Tech (T) =====
      tech_01_label: 'T1. Есть ли единый источник достоверной информации об устройствах и установленном ПО?',
      tech_01_score: ynpScore($('fi_t1').value),

      tech_02_label: 'T2. Автоматизирован ли сбор данных об инфраструктуре (без ручного ввода)?',
      tech_02_score: collectionToT2($('fi_collection').value),

      tech_05_label: 'T5. Обновляются ли данные об устройствах и ПО без ручного вмешательства?',
      tech_05_score: collectionToT5($('fi_collection').value),

      tech_08_label: 'T8. Используются ли данные об инвентаризации в других системах (ITSM, безопасность, лицензирование)?',
      tech_08_score: ynpScore($('fi_t8').value),

      tech_09_label: 'T9. Охвачены ли сбором данных все сегменты инфраструктуры (VDI, филиалы, изолированные контуры)?',
      tech_09_score: ynpScore($('fi_t9').value),

      // ===== Proc (P) — быстрые прокси =====
      proc_05_label: 'P5. Есть ли регламент актуализации данных об устройствах и ПО?',
      proc_05_score: collectionToProc5($('fi_collection').value),

      // ===== Risk flags (R) =====
      risk_05_label: 'Есть частые инциденты/простои (по ощущениям бизнеса)',
      risk_05_val: yn01($('fi_r5').value),

      risk_06_label: 'Были внешние проверки за последние 3 года',
      risk_06_val: yn01($('fi_r6').value),

      risk_07_label: 'Планируются крупные изменения инфраструктуры в 12 месяцев (миграции/слияния)',
      risk_07_val: yn01($('fi_r7').value),

      risk_08_label: 'Высокая текучесть ИТ-персонала/смена подрядчиков',
      risk_08_val: yn01($('fi_r8').value),
    };

    // Mark which ids in the main interview were filled by this fast step
    const fastIds = ['lpr','workplaces','servers','branches','hosting_model','closed','manualPct','tech_01_score','tech_02_score','tech_05_score','tech_08_score','tech_09_score','proc_05_score','risk_05_val','risk_06_val','risk_07_val','risk_08_val'];
    payload.fast_fields = JSON.stringify(fastIds);

    try{
      showLoader('Сохраняю…','Записываю Fast-интервью в PSI_Log через Apps Script');
      const url = WEBAPP_URL + '?action=save&payload=' + encodeURIComponent(JSON.stringify(payload));
      const res = await jsonp(url);
      hideLoader();
      if(!res || !res.ok){
        console.error('save failed', res);
        alert('Не удалось сохранить. Проверь консоль.');
        return;
      }
      // go to main interview
      const u = new URL('view_2_interview.html', location.href);
      u.searchParams.set('company', company);
      location.href = u.toString();
    }catch(e){
      hideLoader();
      console.error(e);
      alert('Ошибка сохранения. Проверь консоль.');
    }
  });
})();
</script>
